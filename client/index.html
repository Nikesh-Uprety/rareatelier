<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Rare Atelier - Premium Streetwear & Minimal Luxury. Discover our exclusive collection of high-quality apparel." />

  <meta property="og:title" content="Rare Atelier" />
  <meta property="og:description" content="Premium Streetwear & Minimal Luxury." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://cdn2.blanxer.com/favicon/67cd36dcf133882caba612b4/692dcfc911060a551836d675.webp" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@rarenepal" />
  <meta name="twitter:title" content="Rare Atelier" />
  <meta name="twitter:description" content="Premium Streetwear & Minimal Luxury." />
  <meta name="twitter:image" content="https://cdn2.blanxer.com/favicon/67cd36dcf133882caba612b4/692dcfc911060a551836d675.webp" />

  <link rel="icon" type="image/webp" href="https://cdn2.blanxer.com/favicon/67cd36dcf133882caba612b4/692dcfc911060a551836d675.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Roboto+Slab:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <title>Rare Atelier | Premium Streetwear</title>
  <script>
    // Apply theme class before React mounts to avoid flash.
    (function () {
      var root = document.documentElement;
      var theme = "light";
      try {
        var saved = localStorage.getItem("theme");
        if (saved === "dark" || saved === "light" || saved === "warm") {
          theme = saved;
        } else {
          theme = "light";
        }
      } catch (e) {}

      root.classList.remove("light", "dark", "warm");
      root.classList.add(theme);
      root.style.colorScheme = theme === "dark" ? "dark" : "light";
    })();
  </script>
  <script>
    // Disable native browser scroll restoration before React mounts.
    (function () {
      try {
        if ("scrollRestoration" in window.history) {
          window.history.scrollRestoration = "manual";
        }
      } catch (e) {}
    })();
  </script>
  <style>
    /* Match the official initial loading state before CSS loads. */
    html {
      background-color: #000000;
    }

    body {
      background-color: #000000;
    }

    /* Initial pre-loader */
    #pre-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.22s ease, visibility 0.22s ease;
      color: #ffffff;
    }

    body.loading {
      overflow: hidden !important;
      height: 100vh;
      background-color: #000000;
    }

    #pre-loader.loaded {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .loader-logo {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      white-space: nowrap;
      font-family: 'Archivo Narrow', 'Inter', sans-serif;
      color: #ffffff;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.18);
    }

    .loader-bar-container {
      width: min(12rem, 48vw);
      height: 2px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
    }

    .loader-bar {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      transform-origin: left center;
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.2);
      animation: loader-progress 1.05s ease-in-out infinite;
      will-change: transform, opacity;
    }

    .loader-status {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.66;
      font-family: 'Inter', sans-serif;
    }

    @keyframes loader-progress {
      0% {
        transform: scaleX(0.18);
        opacity: 0.45;
      }
      50% {
        transform: scaleX(0.78);
        opacity: 1;
      }
      100% {
        transform: scaleX(0.28);
        opacity: 0.6;
      }
    }



    /* Hide root until loaded to prevent flash of unstyled content */
    #root {
      opacity: 0;
      visibility: hidden;
      min-height: 100vh;
      background-color: #ffffff;
      transition: opacity 0.22s ease, visibility 0.22s ease;
    }

    #root.ready {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>

<body class="loading">
  <div id="pre-loader" aria-hidden="true">
    <div class="loader-content">
      <div class="loader-logo">RARE ATELIER</div>
      <div class="loader-bar-container"><div class="loader-bar"></div></div>
      <div class="loader-status">Loading</div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    var finishLoading;

    (function() {
      var loader = document.getElementById('pre-loader');
      var root = document.getElementById('root');
      var body = document.body;
      var hasCompleted = false;

      function revealApp() {
        if (hasCompleted) return;
        hasCompleted = true;
        if (root) {
          root.classList.add('ready');
        }
        if (loader) {
          loader.classList.add('loaded');
        }
        window.setTimeout(function() {
          if (body) body.classList.remove('loading');
          if (loader && loader.parentNode) {
            loader.parentNode.removeChild(loader);
          }
        }, 180);
      }

      finishLoading = revealApp;
      window.finishLoading = finishLoading;

      window.setTimeout(revealApp, 5000);
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
