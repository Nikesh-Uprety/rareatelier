<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Rare Atelier - Premium Streetwear & Minimal Luxury. Discover our exclusive collection of high-quality apparel." />

  <meta property="og:title" content="Rare Atelier" />
  <meta property="og:description" content="Premium Streetwear & Minimal Luxury." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://cdn2.blanxer.com/favicon/67cd36dcf133882caba612b4/692dcfc911060a551836d675.webp" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@rarenepal" />
  <meta name="twitter:title" content="Rare Atelier" />
  <meta name="twitter:description" content="Premium Streetwear & Minimal Luxury." />
  <meta name="twitter:image" content="https://cdn2.blanxer.com/favicon/67cd36dcf133882caba612b4/692dcfc911060a551836d675.webp" />

  <link rel="icon" type="image/webp" href="https://cdn2.blanxer.com/favicon/67cd36dcf133882caba612b4/692dcfc911060a551836d675.webp" />
  <link id="landing-loader-preload" rel="preload" as="image" href="/images/stussy.webp" fetchpriority="high" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Roboto+Slab:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <title>Rare Atelier | Premium Streetwear</title>
  <script>
    // Apply theme class before React mounts to avoid flash.
    (function () {
      var root = document.documentElement;
      var theme = "light";
      try {
        var saved = localStorage.getItem("theme");
        if (saved === "dark" || saved === "light" || saved === "warm") {
          theme = saved;
        } else {
          theme = "light";
        }
      } catch (e) {}

      root.classList.remove("light", "dark", "warm");
      root.classList.add(theme);
      root.style.colorScheme = theme === "dark" ? "dark" : "light";
    })();
  </script>
  <script>
    // Disable native browser scroll restoration before React mounts.
    (function () {
      try {
        if ("scrollRestoration" in window.history) {
          window.history.scrollRestoration = "manual";
        }
      } catch (e) {}
    })();
  </script>
  <script>
    // Tag the initial route before styles evaluate so the boot loader can match the page.
    (function () {
      try {
        var route = window.location.pathname === "/" ? "landing" : "default";
        var root = document.documentElement;
        root.setAttribute("data-initial-route", route);
        if (route === "landing") {
          var fallbackHero = "/images/stussy.webp";
          var cachedHero = fallbackHero;

          try {
            var storedHero = window.localStorage.getItem("rare-landing-loader-hero");
            if (storedHero && /^https?:\/\//.test(storedHero) || (storedHero && storedHero.startsWith("/"))) {
              cachedHero = storedHero;
            }
          } catch (storageError) {}

          root.style.setProperty("--landing-loader-lqip", 'url("data:image/webp;base64,UklGRmIAAABXRUJQVlA4IFYAAADwAwCdASowABsAPuVgp004paOiMBqqqxAciWUAw6wcsT2+ZF/YKHlwAP7uh2krnVxfYRdAQqyN52KfJGgSjXeZVxUqdIW3XL2K4aBbeWD4Rl1jgAAAAA==")');
          root.style.setProperty("--landing-loader-hero", 'url("' + cachedHero.replace(/"/g, '%22') + '")');
          root.style.backgroundColor = "#d8d1c5";
          root.style.backgroundImage = "radial-gradient(circle at top, rgba(255,255,255,0.52), rgba(239,233,224,0.78) 48%, rgba(215,209,197,0.96) 100%), linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(222,216,205,0.16) 100%), var(--landing-loader-lqip)";
          root.style.backgroundPosition = "center, center, center";
          root.style.backgroundSize = "auto, auto, cover";
          root.style.backgroundRepeat = "no-repeat, no-repeat, no-repeat";

          var preloadLink = document.getElementById("landing-loader-preload");
          if (preloadLink) {
            preloadLink.setAttribute("href", cachedHero);
          }

          var loaderImage = new Image();
          loaderImage.decoding = "async";
          loaderImage.fetchPriority = "high";
          loaderImage.src = cachedHero;
          loaderImage.onload = function () {
            root.classList.add("landing-loader-image-ready");
          };
        } else {
          root.style.backgroundColor = "#000000";
          root.style.backgroundImage = "none";
        }
      } catch (e) {}
    })();
  </script>
  <style>
    /* Match the official initial loading state before CSS loads. */
    html {
      background-color: #000000;
    }

    html[data-initial-route="landing"] {
      background-color: #d8d1c5;
      background-image:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.52), rgba(239, 233, 224, 0.78) 48%, rgba(215, 209, 197, 0.96) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(222, 216, 205, 0.16) 100%),
        var(--landing-loader-lqip);
      background-position: center, center, center;
      background-size: auto, auto, cover;
      background-repeat: no-repeat, no-repeat, no-repeat;
    }

    body {
      background-color: #000000;
    }

    html[data-initial-route="landing"] body {
      background-color: #d8d1c5;
      background-image:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.4), rgba(239, 233, 224, 0.52) 48%, rgba(215, 209, 197, 0.72) 100%),
        var(--landing-loader-lqip);
      background-position: center, center;
      background-size: auto, cover;
      background-repeat: no-repeat, no-repeat;
    }

    /* Initial pre-loader */
    #pre-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      overflow: hidden;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.28s ease, visibility 0.28s ease;
      color: #ffffff;
    }

    html[data-initial-route="landing"] #pre-loader {
      background:
        linear-gradient(180deg, rgba(11, 14, 19, 0.08) 0%, rgba(11, 14, 19, 0.18) 100%),
        var(--landing-loader-lqip) center/cover no-repeat;
      color: #ffffff;
    }

    html[data-initial-route="landing"] #pre-loader::before {
      content: "";
      position: absolute;
      inset: -4%;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, rgba(12, 16, 20, 0.2) 100%),
        var(--landing-loader-lqip) center/cover no-repeat;
      transform: scale(1.02);
      filter: blur(7px) saturate(0.94) brightness(0.9);
      opacity: 0.92;
      transition: background-image 0.18s ease, opacity 0.18s ease;
    }

    html[data-initial-route="landing"].landing-loader-image-ready #pre-loader::before {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, rgba(12, 16, 20, 0.2) 100%),
        var(--landing-loader-hero) center/cover no-repeat;
    }

    html[data-initial-route="landing"] #pre-loader::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(9, 12, 16, 0.08) 0%, rgba(9, 12, 16, 0.18) 100%),
        rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    body.loading {
      overflow: hidden !important;
      height: 100vh;
      background-color: #000000;
    }

    html[data-initial-route="landing"] body.loading {
      background-color: #d8d1c5;
    }

    #pre-loader.loaded {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-shell {
      display: none;
    }

    html[data-initial-route="landing"] .loader-shell {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: flex;
      flex-direction: column;
      padding: 16px 18px 24px;
      pointer-events: none;
      color: #ffffff;
    }

    .loader-shell__nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .loader-shell__menu {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.12);
    }

    .loader-shell__menu-icon {
      position: relative;
      display: block;
      width: 20px;
      height: 12px;
    }

    .loader-shell__menu-icon::before,
    .loader-shell__menu-icon::after,
    .loader-shell__menu-icon span {
      content: "";
      position: absolute;
      left: 0;
      height: 1px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
    }

    .loader-shell__menu-icon::before {
      top: 0;
      width: 14px;
    }

    .loader-shell__menu-icon span {
      top: 50%;
      width: 18px;
      transform: translateY(-50%);
    }

    .loader-shell__menu-icon::after {
      bottom: 0;
      width: 11px;
    }

    .loader-shell__menu-label {
      font-family: 'Archivo Narrow', 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.9);
    }

    .loader-shell__actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .loader-shell__action {
      position: relative;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.12);
    }

    .loader-shell__action--search::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 13px;
      height: 13px;
      border: 1.4px solid rgba(255, 255, 255, 0.84);
      border-radius: 999px;
      transform: translate(-55%, -58%);
    }

    .loader-shell__action--search::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 1.4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      left: 57%;
      top: 58%;
      transform: rotate(45deg);
      transform-origin: left center;
    }

    .loader-shell__action--bag::before {
      content: "";
      position: absolute;
      inset: 13px 13px 11px;
      border: 1.4px solid rgba(255, 255, 255, 0.84);
      border-radius: 4px;
    }

    .loader-shell__action--bag::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 10px;
      width: 9px;
      height: 6px;
      border: 1.4px solid rgba(255, 255, 255, 0.84);
      border-bottom: 0;
      border-radius: 999px 999px 0 0;
      transform: translateX(-50%);
    }

    .loader-shell__body {
      position: relative;
      display: flex;
      flex: 1;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .loader-shell__brand-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transform: translateY(-3vh);
    }

    .loader-shell__brand-logo {
      width: clamp(200px, 19vw, 300px);
      object-fit: contain;
      opacity: 0.95;
      filter: brightness(0) invert(1) drop-shadow(0 24px 50px rgba(0, 0, 0, 0.18));
    }

    .loader-shell__brand-nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      margin-top: 30px;
    }

    .loader-shell__brand-nav span {
      font-family: 'Archivo Narrow', 'Inter', sans-serif;
      font-size: clamp(1.45rem, 2vw, 2.1rem);
      font-weight: 600;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
    }

    .loader-shell__socials {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 34px;
    }

    .loader-shell__socials span {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .loader-shell__cta-orb {
      position: absolute;
      right: 24px;
      bottom: 24px;
      display: grid;
      place-items: center;
      width: 64px;
      height: 64px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.92);
      font-size: 28px;
      line-height: 1;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.14);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    @media (min-width: 768px) {
      html[data-initial-route="landing"] .loader-shell {
        padding: 18px 28px 28px;
      }

      .loader-shell__brand-nav {
        gap: 30px;
      }

      .loader-shell__cta-orb {
        width: 78px;
        height: 78px;
      }
    }

    .loader-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .loader-logo {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      white-space: nowrap;
      font-family: 'Archivo Narrow', 'Inter', sans-serif;
      color: #ffffff;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.18);
    }

    .loader-bar-container {
      width: min(12rem, 48vw);
      height: 2px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
    }

    .loader-bar {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      transform-origin: left center;
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.2);
      animation: loader-progress 1.05s ease-in-out infinite;
      will-change: transform, opacity;
    }

    .loader-status {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.66;
      font-family: 'Inter', sans-serif;
    }

    html[data-initial-route="landing"] .loader-logo {
      color: #ffffff;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.16);
    }

    html[data-initial-route="landing"] .loader-bar-container {
      background: rgba(255, 255, 255, 0.18);
    }

    html[data-initial-route="landing"] .loader-bar {
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.18);
    }

    html[data-initial-route="landing"] .loader-status {
      color: rgba(255, 255, 255, 0.68);
      opacity: 1;
    }

    @keyframes loader-progress {
      0% {
        transform: scaleX(0.18);
        opacity: 0.45;
      }
      50% {
        transform: scaleX(0.78);
        opacity: 1;
      }
      100% {
        transform: scaleX(0.28);
        opacity: 0.6;
      }
    }



    /* Hide root until loaded to prevent flash of unstyled content */
    #root {
      opacity: 0;
      visibility: hidden;
      min-height: 100vh;
      background-color: #ffffff;
      transition: opacity 0.28s ease, visibility 0.28s ease, filter 0.28s ease, transform 0.28s ease;
    }

    html[data-initial-route="landing"] #root {
      opacity: 1;
      visibility: visible;
      background-color: #d8d1c5;
    }

    html[data-initial-route="landing"] body.loading #root {
      filter: blur(5px) saturate(0.97);
      transform: scale(1.003);
    }

    #root.ready {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>

<body class="loading">
  <div id="pre-loader" aria-hidden="true">
    <div class="loader-shell">
      <div class="loader-shell__nav">
        <div class="loader-shell__menu">
          <span class="loader-shell__menu-icon"><span></span></span>
          <span class="loader-shell__menu-label">MENU</span>
        </div>
        <div class="loader-shell__actions">
          <div class="loader-shell__action loader-shell__action--search"></div>
          <div class="loader-shell__action loader-shell__action--bag"></div>
        </div>
      </div>
      <div class="loader-shell__body">
        <div class="loader-shell__brand-stack">
          <img class="loader-shell__brand-logo" src="/images/updatedlogo.png" alt="" />
          <div class="loader-shell__brand-nav">
            <span>SHOP</span>
            <span>GALLERY</span>
            <span>ATELIER</span>
            <span>CART</span>
            <span>SUPPORT</span>
          </div>
          <div class="loader-shell__socials">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <div class="loader-shell__cta-orb">↗</div>
      </div>
    </div>
    <div class="loader-content">
      <div class="loader-logo">RARE ATELIER</div>
      <div class="loader-bar-container"><div class="loader-bar"></div></div>
      <div class="loader-status">Loading</div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    var finishLoading;

    (function() {
      var loader = document.getElementById('pre-loader');
      var root = document.getElementById('root');
      var body = document.body;
      var hasCompleted = false;

      function revealApp() {
        if (hasCompleted) return;
        hasCompleted = true;
        if (root) {
          root.classList.add('ready');
        }
        if (loader) {
          loader.classList.add('loaded');
        }
        window.setTimeout(function() {
          if (body) body.classList.remove('loading');
          if (loader && loader.parentNode) {
            loader.parentNode.removeChild(loader);
          }
        }, 220);
      }

      finishLoading = revealApp;
      window.finishLoading = finishLoading;

      window.setTimeout(revealApp, 5000);
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
