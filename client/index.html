<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

  <meta property="og:title" content="Rare Atelier" />
  <meta property="og:description" content="Premium Streetwear & Minimal Luxury." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@replit" />
  <meta name="twitter:title" content="Rare Atelier" />
  <meta name="twitter:description" content="Premium Streetwear & Minimal Luxury." />
  <meta name="twitter:image" content="" />

  <link rel="icon" type="image/webp" href="https://cdn2.blanxer.com/favicon/67cd36dcf133882caba612b4/692dcfc911060a551836d675.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
  <title>Rare Atelier - Premium Streetwear</title>
  <style>
    /* PRE-LOADER STYLES - Must be inline for instant rendering */
    #pre-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 1s cubic-bezier(0.77, 0, 0.175, 1), visibility 1s;
      color: white;
      font-family: 'Playfair Display', serif;
    }

    /* Prevent scrollbar during loading */
    body.loading {
      overflow: hidden !important;
      height: 100vh;
    }

    #pre-loader.loaded {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .loader-logo {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.8em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
      animation: logo-reveal 1.2s ease forwards;
      white-space: nowrap;
      text-indent: 0.8em; /* Offset for letter spacing on last character */
    }

    .loader-bar-container {
      width: 120px;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
      position: relative;
    }

    #loader-progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0;
      background: rgba(255, 255, 255, 0.8);
      transition: width 0.4s cubic-bezier(0.1, 0.5, 0.1, 1);
    }

    @keyframes logo-reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Hide root until loaded to prevent flash of unstyled content */
    #root {
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #root.ready {
      opacity: 1;
    }
  </style>
</head>

<body class="loading">
  <div id="pre-loader">
    <div class="loader-content">
      <div class="loader-logo">RARE ATELIER</div>
      <div class="loader-bar-container">
        <div id="loader-progress"></div>
      </div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    // Handle Reactive Loader Logic
    (function() {
      const loader = document.getElementById('pre-loader');
      const progress = document.getElementById('loader-progress');
      const root = document.getElementById('root');
      const body = document.body;
      let currentProgress = 0;
      let interval;

      // Initial fast progress
      function startSimulatedProgress() {
        interval = setInterval(() => {
          if (currentProgress < 85) {
            currentProgress += Math.random() * 5;
            if (currentProgress > 85) currentProgress = 85;
            progress.style.width = currentProgress + '%';
          }
        }, 200);
      }

      function finishLoading() {
        clearInterval(interval);
        progress.style.width = '100%';
        
        setTimeout(() => {
          loader.classList.add('loaded');
          root.classList.add('ready');
          
          // Remove scroll lock with a slight delay
          setTimeout(() => {
            body.classList.remove('loading');
          }, 800);
        }, 600);
      }

      // Start the progress as soon as this script runs
      startSimulatedProgress();

      // Finalize on full load
      if (document.readyState === 'complete') {
        finishLoading();
      } else {
        window.addEventListener('load', finishLoading);
      }

      // Safety timeout in case window.onload takes too long
      setTimeout(finishLoading, 6000);
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
